<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 Diagnóstico GPT-5</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: monospace;
            font-size: 13px;
            resize: vertical;
            min-height: 80px;
            transition: border-color 0.3s;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .button-group {
            display: flex;
            gap: 10px;
        }
        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn-test {
            background: #667eea;
            color: white;
        }
        .btn-test:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-test:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .btn-clear {
            background: #f0f0f0;
            color: #333;
        }
        .btn-clear:hover {
            background: #e0e0e0;
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            display: none;
        }
        .result.show {
            display: block;
        }
        .result.success {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
        }
        .result.error {
            background: #ffebee;
            border-left: 4px solid #f44336;
        }
        .result.warning {
            background: #fff3e0;
            border-left: 4px solid #ff9800;
        }
        .result h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 16px;
        }
        .result-content {
            background: white;
            padding: 15px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.5;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
        }
        .status-badge.ok {
            background: #c8e6c9;
            color: #1b5e20;
        }
        .status-badge.empty {
            background: #ffccbc;
            color: #bf360c;
        }
        .status-badge.processing {
            background: #b3e5fc;
            color: #01579b;
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .info-box {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
            font-size: 13px;
            color: #555;
            line-height: 1.6;
        }
        code {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
            color: #d63384;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Diagnóstico GPT-5</h1>
        <p class="subtitle">Teste rápido para verificar se GPT-5 está respondendo corretamente</p>
        
        <div class="info-box">
            ⚠️ <strong>Importante:</strong> Este é um endpoint de diagnóstico. Ele faz uma chamada simples ao GPT-5 para verificar se a API está respondendo corretamente. Se retornar resposta vazia, há um problema com GPT-5.
        </div>
        
        <div class="form-group">
            <label for="message">Mensagem de teste:</label>
            <textarea id="message" placeholder="Digite a mensagem para testar GPT-5...">Teste simples: responda 'OK'</textarea>
        </div>
        
        <div class="button-group">
            <button class="btn-test" onclick="testarGPT5()" id="btnTest">🚀 Testar GPT-5</button>
            <button class="btn-clear" onclick="limpar()">🗑️ Limpar</button>
        </div>
        
        <div id="resultado" class="result">
            <h3 id="resultTitle">Resultado</h3>
            <div class="result-content" id="resultContent"></div>
            <div id="statusBadge"></div>
        </div>
    </div>

    <script>
        async function testarGPT5() {
            const message = document.getElementById('message').value.trim();
            const btnTest = document.getElementById('btnTest');
            const resultado = document.getElementById('resultado');
            const resultTitle = document.getElementById('resultTitle');
            const resultContent = document.getElementById('resultContent');
            const statusBadge = document.getElementById('statusBadge');
            
            if (!message) {
                alert('Por favor, digite uma mensagem de teste');
                return;
            }
            
            // Desabilitar botão e mostrar loading
            btnTest.disabled = true;
            btnTest.innerHTML = '<span class="spinner"></span>Testando...';
            resultado.classList.remove('show', 'success', 'error', 'warning');
            resultado.classList.add('show', 'warning');
            resultTitle.textContent = '⏳ Testando...';
            resultContent.textContent = 'Aguardando resposta do servidor...\n\nIsso pode levar alguns segundos...';
            statusBadge.innerHTML = '<span class="status-badge processing"><span class="spinner"></span>Processando</span>';
            
            const startTime = performance.now();
            
            try {
                console.log('📤 Enviando requisição para /api/test-gpt5');
                console.log('   Mensagem:', message);
                
                const response = await fetch('https://analise-bid-ia-backend.onrender.com/api/test-gpt5', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message
                    })
                });
                
                const endTime = performance.now();
                const tempoResposta = ((endTime - startTime) / 1000).toFixed(2);
                
                console.log(`📥 Resposta recebida em ${tempoResposta}s`);
                console.log('   Status HTTP:', response.status);
                
                const data = await response.json();
                console.log('   Dados:', data);
                
                // Formatação da saída
                let output = `[${new Date().toLocaleTimeString()}]\n`;
                output += `Status: ${data.status}\n`;
                output += `Tempo de resposta: ${data.tempo}s\n`;
                
                if (data.status === 'sucesso') {
                    output += `Content recebido: SIM\n`;
                    output += `Tamanho: ${data.tamanho} caracteres\n`;
                    output += `Vazio? ${data.content_is_empty ? 'SIM ❌' : 'NÃO ✅'}\n`;
                    output += `\n--- Conteúdo ---\n${data.content}`;
                    
                    resultado.classList.remove('warning', 'error');
                    resultado.classList.add('success');
                    resultTitle.textContent = data.content_is_empty ? '⚠️ Resposta vazia (BUG)' : '✅ GPT-5 respondendo corretamente!';
                    
                    if (data.content_is_empty) {
                        statusBadge.innerHTML = '<span class="status-badge empty">VAZIO - BUG ENCONTRADO</span>';
                    } else {
                        statusBadge.innerHTML = '<span class="status-badge ok">OK - GPT-5 funciona</span>';
                    }
                    
                } else if (data.status === 'aviso') {
                    output += `⚠️ Resposta vazia ou muito pequena\n`;
                    output += `Tamanho: ${data.tamanho} caracteres\n`;
                    output += `\n--- Content ---\n${data.content || '(vazio)'}`;
                    
                    resultado.classList.remove('success', 'error');
                    resultado.classList.add('warning');
                    resultTitle.textContent = '⚠️ Aviso: Resposta vazia';
                    statusBadge.innerHTML = '<span class="status-badge empty">VAZIO</span>';
                    
                } else {
                    output += `❌ ERRO: ${data.erro}`;
                    
                    resultado.classList.remove('success', 'warning');
                    resultado.classList.add('error');
                    resultTitle.textContent = '❌ Erro ao testar';
                    statusBadge.innerHTML = '<span class="status-badge empty">ERRO</span>';
                }
                
                resultContent.textContent = output;
                
            } catch (error) {
                console.error('❌ Erro:', error);
                const endTime = performance.now();
                const tempoResposta = ((endTime - startTime) / 1000).toFixed(2);
                
                resultado.classList.remove('success', 'warning');
                resultado.classList.add('error');
                resultTitle.textContent = '❌ Erro na requisição';
                
                let output = `[${new Date().toLocaleTimeString()}]\n`;
                output += `Tempo: ${tempoResposta}s\n`;
                output += `Erro: ${error.message}\n\n`;
                output += `Possíveis causas:\n`;
                output += `• Backend offline (Render em down time)\n`;
                output += `• Problema de conectividade\n`;
                output += `• CORS bloqueando requisição\n`;
                output += `• Servidor ainda fazendo deploy\n\n`;
                output += `Tente novamente em alguns segundos...`;
                
                resultContent.textContent = output;
                statusBadge.innerHTML = '<span class="status-badge empty">ERRO DE CONEXÃO</span>';
            } finally {
                btnTest.disabled = false;
                btnTest.innerHTML = '🚀 Testar GPT-5';
            }
        }
        
        function limpar() {
            document.getElementById('message').value = 'Teste simples: responda "OK"';
            document.getElementById('resultado').classList.remove('show', 'success', 'error', 'warning');
            document.getElementById('resultContent').textContent = '';
        }
        
        // Permitir Enter para testar
        document.getElementById('message').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                testarGPT5();
            }
        });
    </script>
</body>
</html>
